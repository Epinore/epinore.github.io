<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Battle Arena v2 - CPS & Reaction Duel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: white;
            transition: background-color 0.5s ease;
            color: #333;
        }

        /* 游戏容器 */
        .game-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            background-color: white;
            border-radius: 0;
            /* No rounded corners for accurate click areas */
            margin: 0;
            /* No margin for full screen coverage */
            box-shadow: none;
            z-index: 10;
            /* Ensure interaction layer is above visual layer */
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            width: 100%;
            height: 100%;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #blue-area,
            #red-area {
                width: 100% !important;
                /* Force full width on mobile */
                height: 50% !important;
                /* Force 50% height on mobile */
            }

            .visual-layer {
                flex-direction: column;
            }

            #visual-blue,
            #visual-red {
                width: 100% !important;
                height: 50%;
                /* Start at 50% height */
            }

            .visual-divider {
                width: 100%;
                height: 4px;
                left: 0;
                top: 50%;
                transform: translateY(-50%);
                transition: top 0.1s ease-out;
                /* Animate top instead of left */
            }
        }

        /* .player-area - CRITICAL: Must be exactly 50% for fair gameplay */
        .player-area {
            width: 50%;
            /* Exactly 50% for fair split */
            height: 100%;
            /* Full height */
            transition: width 0.1s ease-out, background-color 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 0;
            /* No rounded corners - critical for accurate click detection */
            margin: 0;
            padding: 0;
            border: none;
        }

        /* CPS模式样式 - No borders to ensure click area alignment */
        .cps-mode #blue-area {
            background: transparent;
            border: none;
        }

        /* Visual Layer Styles */
        .visual-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: flex;
            pointer-events: none;
            /* purely visual */
        }

        /* Update CPS Mode to be transparent */
        .cps-mode .game-container {
            background-color: transparent;
            box-shadow: none;
            /* Remove shadow to blend with visual layer */
        }

        .cps-mode .player-area {
            background: transparent !important;
            /* Visuals handled by visual-layer */
            border: none;
        }

        .cps-mode .divider {
            display: none;
            /* Hide original divider in CPS mode */
        }

        /* Helper class to hide game description on mobile */
        @media (max-width: 768px) {
            .mobile-hidden {
                display: none !important;
            }
        }

        #visual-blue,
        #visual-red {
            height: 100%;
            width: 50%;
            /* Start at 50% */
            transition: width 0.1s ease-out, height 0.1s ease-out;
        }

        #visual-blue {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        #visual-red {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
        }

        .visual-divider {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
            background-color: rgba(255, 255, 255, 0.8);
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            z-index: 1;
            transition: left 0.1s ease-out;
        }

        /* Full Screen Updates for Reaction & Timing */
        .reaction-mode .game-container,
        .timing-mode .game-container {
            margin: 0;
            border-radius: 0;
            width: 100%;
            height: 100%;
            box-shadow: none;
            background: transparent;
        }

        .reaction-mode .player-area,
        .timing-mode .player-area {
            border: none;
            border-radius: 0 !important;
            /* Remove borders and rounded corners for immersive full-screen feel */
        }

        /* 反应模式样式 - Premium Gradients */
        .reaction-mode #blue-area {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        }

        .reaction-mode #red-area {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
        }

        /* Timing模式样式 - Premium Gradients */
        .timing-mode #blue-area {
            background: linear-gradient(to bottom right, #4facfe 0%, #00f2fe 100%);
        }

        .timing-mode #red-area {
            background: linear-gradient(to top left, #ff0844 0%, #ffb199 100%);
        }

        .fixed-divider {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            border-left: 2px dashed rgba(255, 255, 255, 0.6);
            transform: translateX(-50%);
            z-index: 2;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .visual-divider {
                width: 100% !important;
                /* Force full width on mobile */
                height: 4px !important;
                /* Fixed height on mobile */
                left: 0 !important;
                top: 50%;
                transform: translateY(-50%) !important;
                transition: top 0.1s ease-out !important;
            }

            .fixed-divider {
                left: 0;
                right: 0;
                top: 50%;
                width: 100%;
                height: 2px;
                border-left: none;
                border-top: 2px dashed rgba(255, 255, 255, 0.6);
                transform: translateY(-50%);
            }
        }

        /* Update CPS Mode to be transparent */
        .cps-mode .player-area {
            background: transparent !important;
            /* Visuals handled by visual-layer */
            border: none;
        }

        .cps-mode #blue-area {
            /* Keep border for debugging or remove? Removing as per plan */
            /* border: 3px solid #005f99; */
            border: none;
        }

        .cps-mode #red-area {
            /* border: 3px solid #c0392b; */
            border: none;
        }

        /* 反应模式样式 - Reaction mode still needs its own background? 
           Request said "CPS Battle Logic". Assuming Reaction mode keeps its own style or uses visual layer too?
           User request: "现在改一下CPS对战的逻辑". So Reaction mode should remain as is.
           However, .player-area is shared. 
           We need to ensure Reaction mode still has backgrounds if we made .player-area transparent.
           My CSS above targets `.cps-mode .player-area`. so Reaction mode should be safe if it uses `.reaction-mode .player-area`.
        */

        /* Full Screen Updates for Reaction & Timing */
        .reaction-mode .game-container,
        .timing-mode .game-container {
            margin: 0;
            border-radius: 0;
            width: 100%;
            height: 100%;
            box-shadow: none;
            background: transparent;
        }

        .reaction-mode .player-area,
        .timing-mode .player-area {
            border: none;
            /* Remove borders for immersive feel */
        }

        /* 反应模式样式 - Premium Gradients */
        .reaction-mode #blue-area {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        }

        .reaction-mode #red-area {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
        }

        #blue-area,
        #red-area {
            width: 50%;
            height: 100%;
            /* Ensure full height for interaction */
        }

        /* 分界线 - Make it full screen in these modes */
        .reaction-mode .divider,
        .timing-mode .divider {
            top: 0;
            bottom: 0;
            border-radius: 0;
            background-color: rgba(255, 255, 255, 0.5);
            /* subtler divider */
        }

        /* 分界线 */
        .divider {
            position: absolute;
            top: 10%;
            bottom: 10%;
            left: 50%;
            width: 4px;
            background-color: #333;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            z-index: 10;
            transition: left 0.1s ease-out;
            border-radius: 2px;
        }

        /* 游戏信息区域 */
        .game-info {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
            color: #333;
            pointer-events: none;
            /* 让点击穿透，不阻挡游戏操作 */
        }

        /* 只对真正的按钮恢复点击事件，文字等元素保持穿透 */
        .mode-button,
        .start-button {
            pointer-events: auto;
        }

        /* 模式选择 */
        .mode-selector {
            margin-bottom: 20px;
        }

        .mode-button {
            padding: 12px 24px;
            font-size: 1.2em;
            margin: 0 10px;
            background-color: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .mode-button:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .mode-button.active {
            background-color: #4CAF50;
            color: white;
            border-color: #45a049;
        }

        /* 计时器 */
        .counter {
            font-size: 5em;
            font-weight: bold;
            margin-bottom: 20px;
            opacity: 1;
            transform: scale(1);
            transition: all 0.3s ease;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
        }

        .counter.countdown {
            animation: countdown-pulse 1s ease-in-out;
        }

        @keyframes countdown-pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
                text-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 说明文字 */
        .instruction {
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 分数显示 */
        .scores {
            display: flex;
            justify-content: space-around;
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #blue-score {
            color: #2980b9;
            text-shadow: 2px 2px 4px rgba(41, 128, 185, 0.2);
        }

        #red-score {
            color: #c0392b;
            text-shadow: 2px 2px 4px rgba(192, 57, 43, 0.2);
        }

        /* CPS显示 */
        .cps-display {
            display: flex;
            justify-content: space-around;
            font-size: 1.2em;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-weight: bold;
        }

        /* 游戏时间显示 */
        .game-time {
            font-size: 1.2em;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-weight: bold;
        }

        /* 开始按钮 */
        .start-button {
            padding: 15px 40px;
            font-size: 1.5em;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
            font-weight: bold;
            box-shadow: 0 6px 12px rgba(46, 204, 113, 0.4);
        }

        .start-button:hover {
            background-color: #27ae60;
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(46, 204, 113, 0.6);
        }

        .start-button:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(46, 204, 113, 0.4);
        }

        .start-button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 胜利者显示 */
        .winner-display {
            position: absolute;
            top: 30%;
            /* Move up */
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 5em;
            font-weight: 800;
            color: #333;
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 101;
            /* Above stats */
            background: transparent;
            /* Remove box, just text? Or keep box? Text looks cleaner if huge. */
            /* User guide: "Improve UI". Clean text is better for "Victory". */
            padding: 0;
            box-shadow: none;
            animation: victory-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            white-space: nowrap;
        }

        @keyframes victory-pop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }

            70% {
                transform: translate(-50%, -50%) scale(1.2);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* 按键提示 */
        .key-hint {
            position: absolute;
            bottom: 20px;
            font-size: 2em;
            font-weight: bold;
            color: #333;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        #blue-key {
            left: 20px;
        }

        #red-key {
            right: 20px;
        }

        .key-box {
            display: inline-block;
            padding: 10px 20px;
            background-color: #fff;
            border-radius: 10px;
            border: 3px solid #ddd;
            margin-left: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            font-family: 'Courier New', monospace;
        }

        /* 震动动画 */
        .vibrate {
            animation: vibrate 0.3s ease-in-out;
        }

        @keyframes vibrate {

            0%,
            100% {
                transform: translate(0);
            }

            25% {
                transform: translate(-5px, 5px);
            }

            50% {
                transform: translate(0);
            }

            75% {
                transform: translate(5px, -5px);
            }
        }

        /* 波纹效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple 0.8s ease-out;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(6);
                opacity: 0;
            }
        }

        /* 反应时间显示 */
        .reaction-time {
            display: flex;
            justify-content: space-around;
            font-size: 1.2em;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-weight: bold;
        }

        /* 目标时间显示 */
        .target-time {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            color: #e67e22;
            text-shadow: 2px 2px 4px rgba(230, 126, 34, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Timing模式样式 */
        .timing-mode #blue-area {
            background: linear-gradient(to right, #64b5f6, #42a5f5);
            border: 3px solid #2196f3;
        }

        .timing-mode #red-area {
            background: linear-gradient(to left, #ef5350, #e53935);
            border: 3px solid #d32f2f;
        }

        /* 秒表显示 */
        .stopwatch {
            font-size: 3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            font-family: 'Courier New', monospace;
        }

        /* 玩家名称标签 */
        .player-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        /* 目标时间显示 */
        .target-time {
            font-size: 2.2em;
            font-weight: 800;
            margin: 20px auto;
            color: #fff;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 15px 35px;
            border-radius: 50px;
            border: 1.5px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            display: inline-block;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .target-time {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 30;
                font-size: 1.4em;
                padding: 10px 24px;
            }
        }

        /* Timing模式样式 - Premium Gradients */
        .timing-mode #blue-area {
            background: linear-gradient(to bottom right, #4facfe 0%, #00f2fe 100%);
        }

        .timing-mode #red-area {
            background: linear-gradient(to top left, #ff0844 0%, #ffb199 100%);
        }

        /* 秒表显示 */
        .stopwatch {
            font-size: 3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            font-family: 'Courier New', monospace;
        }

        /* 玩家名称标签 */
        .player-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        #blue-reaction {
            color: #2980b9;
        }

        #red-reaction {
            color: #c0392b;
        }

        /* 彩带效果容器 */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 40;
            overflow: hidden;
        }

        /* 反应模式小球 */
        .reaction-ball {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background-color: #ff0000;
            transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), inset 0 0 50px rgba(255, 255, 255, 0.2);
            border: 5px solid rgba(255, 255, 255, 0.5);
        }

        #blue-ball {
            background-color: #4DA9FF;
            box-shadow: 0 10px 20px rgba(77, 169, 255, 0.3), inset 0 0 50px rgba(255, 255, 255, 0.3);
        }

        #red-ball {
            background-color: #FF6B6B;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3), inset 0 0 50px rgba(255, 255, 255, 0.3);
        }

        .reaction-ball.green {
            background-color: #00ff66 !important;
            transform: scale(1.2);
            box-shadow: 0 0 50px #00ff66, 0 0 100px #00ff66, inset 0 0 50px rgba(0, 255, 102, 0.6);
            animation: pulse-glow 0.5s ease-in-out;
            border-color: #00ff66;
        }

        @keyframes pulse-glow {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 rgba(0, 255, 102, 0.7);
            }

            50% {
                transform: scale(1.25);
                box-shadow: 0 0 60px rgba(0, 255, 102, 0.9), 0 0 120px rgba(0, 255, 102, 0.6);
            }

            100% {
                transform: scale(1.2);
                box-shadow: 0 0 50px rgba(0, 255, 102, 0.7), 0 0 100px rgba(0, 255, 102, 0.5);
            }
        }

        /* 区域闪烁光效 */
        .blue-flash {
            animation: blue-blink 0.3s ease-in-out infinite alternate;
        }

        .red-flash {
            animation: red-blink 0.3s ease-in-out infinite alternate;
        }

        @keyframes blue-blink {
            0% {
                background-color: #f0f8ff;
            }

            100% {
                background-color: #e6f2ff;
                box-shadow: inset 0 0 50px rgba(51, 153, 255, 0.5);
            }
        }

        @keyframes red-blink {
            0% {
                background-color: #f0f8ff;
            }

            100% {
                background-color: #fff0f0;
                box-shadow: inset 0 0 50px rgba(255, 153, 153, 0.5);
            }
        }

        /* 按钮容器 */
        .button-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        /* 最终结果显示 */
        /* 最终结果显示 - Premium UI */
        .final-stats {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            /* Center perfectly */
            min-width: 400px;
            text-align: center;
            font-size: 1.2em;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Bouncy transition */
            font-weight: bold;

            /* Glassmorphism */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 30px 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2), 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .final-stats.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .final-stats div {
            margin: 10px 0;
            color: #2c3e50;
        }

        /* 当显示最终统计时，允许鼠标事件 */
        .final-stats.show {
            pointer-events: auto;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
            }

            .player-area {
                width: 100% !important;
                /* 强制覆盖JS设置的宽度 */
                height: 50%;
                transition: height 0.1s ease-out, background-color 0.5s ease;
            }

            .divider {
                width: 100%;
                height: 4px;
                left: 0 !important;
                bottom: auto !important;
                /* Force reset bottom */
                top: 50%;
                transform: translateY(-50%);
                transition: top 0.1s ease-out;
            }

            /* Ensure Reaction/Timing dividers are also correct on mobile */
            .reaction-mode .divider,
            .timing-mode .divider {
                top: 50% !important;
                bottom: auto !important;
                height: 4px !important;
                width: 100% !important;
                border-radius: 0;
            }

            /* 调整移动端文字大小 */
            .counter {
                font-size: 3em;
            }

            .winner-display {
                font-size: 3em;
                width: 90%;
            }

            /* 按键提示在移动端可以是点击区域提示 */
            .key-hint {
                font-size: 1.2em;

                top: 50%;

            body.cps-mode .game-time,
            body.cps-mode .scores,
            body.cps-mode .cps-display {
                display: none !important;
            }

            /* Only hide instructions when game is actually running */
            body.game-started.cps-mode .instruction {
                display: none !important;
            }

            /* Reaction Mode Mobile Simplification (User Request) */
            /* Always hide scores and reaction times in mobile reaction mode */
            body.reaction-mode .scores,
            body.reaction-mode .reaction-time {
                display: none !important;

        .settings-panel {

        }

            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .settings-row:last-child {
            margin-bottom: 0;
        }

            font-size: 0.95em;
            color: #555;
            flex-shrink: 0;
            margin-right: 10px;
        }

        .settings-row input[type="number"] {
            width: 80px;
            padding: 8px 10px;
            border: 1.5px solid rgba(0, 0, 0, 0.12);
            border-radius: 10px;
            font-size: 1em;
            text-align: center;

            transition: border-color 0.2s ease;
            outline: none;
        }

        .settings-row input[type="number"]:focus {

        }

        .settings-row select {
            padding: 8px 10px;
            border: 1.5px solid rgba(0, 0, 0, 0.12);
            border-radius: 10px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.8);

            cursor: pointer;
        }

        }

        /* Color Palette */
        .color-palette {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);

        }

        .settings-row input[type="text"] {

            padding: 8px 10px;
            border: 1.5px solid rgba(0, 0, 0, 0.12);
            border-radius: 10px;
            font-size: 1em;

            outline: none;
        }

        }

        .key-input {

        .settings-buttons {
            display: flex;

            padding: 12px;
            border: none;

        /* Hide settings icon during active game */
        body.game-started .settings-icon {

        /* ROBUST FIX: Force hide controls when game is started to prevent ghost clicks */
        body.game-started .mode-selector,

        }
    </style>

        // 游戏设置（可通过设置面板修改）
        const gameSettings = {
            cpsWinScore: 30,
            reactionMinWait: 5,
            reactionMaxWait: 14,
            timingMinTarget: 0,
            timingMaxTarget: 5,
            timingPrecision: 1,
            blueKey: 's',
            redKey: 'l',

            blueColor: 0,   // index into colorPresets

        // 初始化颜色选择面板
        function initColorPalettes() {
            const bluePalette = document.getElementById('blue-color-palette');
            const redPalette = document.getElementById('red-color-palette');
            bluePalette.innerHTML = '';
            redPalette.innerHTML = '';

            colorPresets.forEach((color, index) => {
                // 蓝方
                const blueEl = document.createElement('div');
                blueEl.className = 'color-swatch' + (index === gameSettings.blueColor ? ' selected' : '');
                blueEl.style.background = color.gradient;
                blueEl.title = color.name;
                blueEl.dataset.index = index;
                blueEl.addEventListener('click', () => {
                    bluePalette.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                    blueEl.classList.add('selected');
                });
                bluePalette.appendChild(blueEl);

                // 红方
                const redEl = document.createElement('div');
                redEl.className = 'color-swatch' + (index === gameSettings.redColor ? ' selected' : '');
                redEl.style.background = color.gradient;
                redEl.title = color.name;
                redEl.dataset.index = index;
                redEl.addEventListener('click', () => {
                    redPalette.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));

                });
                redPalette.appendChild(redEl);

            // 应用CPS视觉层颜色
            const visualBlue = document.getElementById('visual-blue');
            const visualRed = document.getElementById('visual-red');
            if (visualBlue) visualBlue.style.background = blueGradient;
            if (visualRed) visualRed.style.background = redGradient;

            blueArea.style.background = blueGradient;
            redArea.style.background = redGradient;

            // 重新触发switchMode以刷新名称和按键
            switchMode(gameState.mode);

        function openSettings() {
            if (gameState.started || gameState.countingDown) return;

            const overlay = document.getElementById('settings-overlay');

            document.getElementById('setting-reaction-min').value = gameSettings.reactionMinWait;
            document.getElementById('setting-reaction-max').value = gameSettings.reactionMaxWait;
            document.getElementById('setting-timing-min').value = gameSettings.timingMinTarget;
            document.getElementById('setting-timing-max').value = gameSettings.timingMaxTarget;
            document.getElementById('setting-timing-precision').value = gameSettings.timingPrecision;

            if (isNaN(timingMax) || timingMax <= 0) errors.push({ el: timingMaxEl, msg: '卡秒最大目标时间必须大于0' });
            if (errors.length === 0 && reactionMin >= reactionMax) errors.push({ el: reactionMaxEl, msg: '最长等待时间必须大于最短等待时间' });
            if (errors.length === 0 && timingMin >= timingMax) errors.push({ el: timingMaxEl, msg: '最大目标时间必须大于最小目标时间' });

            if (!redKey || redKey.length !== 1) errors.push({ el: redKeyEl, msg: '红方按键必须为单个字符' });

            if (errors.length > 0) {

            gameSettings.reactionMinWait = reactionMin;
            gameSettings.reactionMaxWait = reactionMax;
            gameSettings.timingMinTarget = timingMin;

        // 更新游戏状态（CPS模式）
        function updateGameState() {
            if (gameState.mode === 'cps' && gameState.started) {
                // Update Mobile Stats
                const blueMobileScore = document.querySelector('#blue-mobile-stats .mobile-score');
                const redMobileScore = document.querySelector('#red-mobile-stats .mobile-score');

                if (blueMobileScore) blueMobileScore.textContent = gameState.blueScore;
                if (redMobileScore) redMobileScore.textContent = gameState.redScore;

                const difference = gameState.blueScore - gameState.redScore;
                const maxDifference = gameSettings.cpsWinScore;

                // 计算宽度百分比
                let blueWidth = 50 + (difference / maxDifference) * 50;
                let redWidth = 50 - (difference / maxDifference) * 50;

                // 限制在合理范围内
                blueWidth = Math.max(0, Math.min(100, blueWidth));
                redWidth = Math.max(0, Math.min(100, redWidth));

                // 更新DOM - 视觉层
                const visualBlue = document.getElementById('visual-blue');
                const visualRed = document.getElementById('visual-red');
                const visualDivider = document.querySelector('.visual-divider');
                const isMobile = window.innerWidth <= 768;

                if (isMobile) {
                    // 移动端：更新高度和Top
                    visualBlue.style.height = `${blueWidth}%`; // logic uses 'width' var name for percentage
                    visualRed.style.height = `${redWidth}%`;
                    visualDivider.style.top = `${blueWidth}%`;

                    // Reset widths
                    visualBlue.style.width = '100%';
                    visualRed.style.width = '100%';
                    visualDivider.style.left = '50%';
                    visualDivider.style.transform = 'translate(-50%, -50%)'; // Reset X transform, keep Y centering from CSS?
                    // Actually CSS says: top 50%; transform: translateY(-50%); for default.
                    // Here we are setting top dynamically. 
                    // If we set top to 70%, we probably want transform: translateY(-50%) to keep it centered on the line? Yes.
                    visualDivider.style.transform = 'translateY(-50%)';

                } else {
                    // 桌面端：更新宽度和Left
                    visualBlue.style.width = `${blueWidth}%`;
                    visualRed.style.width = `${redWidth}%`;

        // 更新CPS

                    const loserTime = winner === 'blue' ? gameState.redReactionTime : gameState.blueReactionTime;

        // Web Audio API 初始化
        let audioContext;
        try {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
        } catch (e) {
            console.log('Web Audio API 不受支持，将使用模拟音效');
        }

        // 生成音调函数
        function playTone(frequency, duration, type = 'sine', volume = 0.3) {
            if (!audioContext) return;

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = type;
            oscillator.frequency.value = frequency;

            gainNode.gain.value = volume;

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();

            // 淡入效果
            gainNode.gain.exponentialRampToValueAtTime(volume, audioContext.currentTime + 0.01);

            // 淡出效果
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

            // 结束音调
            setTimeout(() => {
                oscillator.stop();
            }, duration * 1000);
        }

        // 播放音效
        function playSound(soundType) {
            // 检查并恢复音频上下文（浏览器限制）
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }

            // 根据音效类型播放不同的音调
            switch (soundType.id || soundType) {
                case 'start-sound':
                case 'game-start':
                    playTone(880, 0.3, 'sine', 0.2);
                    break;
                case 'countdown-tick':
                    playTone(440, 0.2, 'sine', 0.15);
                    break;
                case 'click-blue':
                    playTone(660, 0.1, 'sine', 0.25);
                    break;
                case 'click-red':
                    playTone(554, 0.1, 'sine', 0.25);
                    break;
                case 'victory-sound':
                    // 胜利音效序列
                    playTone(660, 0.2, 'sine', 0.3);
                    setTimeout(() => playTone(880, 0.2, 'sine', 0.3), 200);
                    setTimeout(() => playTone(1320, 0.5, 'sine', 0.3), 400);
                    break;
                case 'error-sound':
                case 'buzz-sound':
                    playTone(110, 0.5, 'triangle', 0.3);
                    break;
                case 'green-light':
                    playTone(1046.5, 0.4, 'sine', 0.3);
                    break;
            }
        }

        // 处理玩家操作的函数
        function handlePlayerAction(player) {
            // 防御：忽略启动时的综合/幽灵点击事件 (Synthetic clicks)
            if (performance.now() < gameState.ignoreInputsUntil) {
                console.log('忽略幽灵点击 (Deadzone)', { player, timeRemaining: gameState.ignoreInputsUntil - performance.now() });
                return;
            }

            console.log('handlePlayerAction被调用', { player, gameState });

            // 检查是否已经结束游戏
            if (gameState.ended) {
                console.log('游戏已经结束，不处理操作');
                return;
            }

            // 检查是否是反应模式下的提前点击
            if (gameState.mode === 'reaction') {
                console.log('反应模式检查', {
                    started: gameState.started,
                    greenTime: gameState.greenTime,
                    ended: gameState.ended,
                    falseStart: gameState.falseStart
                });

                // 如果游戏已经开始但球还没变绿，就是提前点击
                if (gameState.started && !gameState.greenTime) {
                    console.log('检测到提前点击', { player });

                    // 设置提前点击状态
                    gameState.falseStart = true;
                    gameState.falseStartPlayer = player;
                    gameState.ended = true;
                    gameState.started = false;

                    // 清除反应定时器 - 确保球不会变绿
                    console.log('尝试清除反应定时器:', gameState.reactionTimer);
                    if (gameState.reactionTimer) {
                        clearTimeout(gameState.reactionTimer);
                        gameState.reactionTimer = null;
                        console.log('定时器已清除');
                    }

                    // 播放错误音效
                    playSound('buzz-sound');

                    // 震动反馈
                    if (navigator.vibrate) {
                        navigator.vibrate([50, 50, 50]);
                    }

                    // 显示错误信息
                    counter.textContent = 'False Start!';
                    instruction.textContent = `${player === 'blue' ? '蓝方' : '红方'} 提前点击了！`;

                    // 直接结束游戏，另一方获胜
                    const winner = player === 'blue' ? 'red' : 'blue';
                    console.log('结束游戏，获胜方:', winner);

                    // 显示胜利者
                    winnerDisplay.textContent = winner === 'blue' ? 'Blue Wins!' : 'Red Wins!';
                    winnerDisplay.style.display = 'block';

                    // 恢复模式选择按钮
                    document.querySelector('.mode-selector').style.display = 'block';
                    document.body.classList.remove('game-started');

                    // 显示最终统计
                    showFinalStats();

                    // 播放胜利音效
                    playSound('victory-sound');

                    // 震动反馈
                    if (navigator.vibrate) {
                        navigator.vibrate([100, 50, 100]);
                    }

                    // 显示彩带效果
                    createConfetti(winner);

                    // 启用开始按钮
                    startCPSButton.disabled = false;
                    startReactionButton.disabled = false;
                    startTimingButton.disabled = false;

                    return;
                }
            }

            if ((gameState.started || gameState.mode === 'reaction' || gameState.mode === 'timing') && !gameState.countingDown) {
                const isBlue = player === 'blue';
                const area = isBlue ? blueArea : redArea;
                const pressedState = isBlue ? 'bluePressed' : 'redPressed';
                const scoreState = isBlue ? 'blueScore' : 'redScore';
                const reactionState = isBlue ? 'blueReactionTime' : 'redReactionTime';
                const reactionText = isBlue ? blueReaction : redReaction;
                const sound = isBlue ? clickBlue : clickRed;
                const stopwatchState = isBlue ? 'blueStopwatchTime' : 'redStopwatchTime';

                // 防作弊：只在释放后才允许再次计数
                if (!gameState[pressedState]) {
                    gameState[pressedState] = true;

                    if (gameState.mode === 'cps' && gameState.started) {
                        gameState[scoreState]++;
                        updateGameState();

                        // 添加震动效果
                        area.classList.add('vibrate');
                        setTimeout(() => {
                            area.classList.remove('vibrate');
                        }, 300);

                        // 创建波纹效果
                        const rect = area.getBoundingClientRect();
                        createRipple(rect.width / 2, rect.height / 2, player);

                        // 播放点击音效
                        playSound(sound);

                        // 移动设备震动反馈
                        if ('vibrate' in navigator) {
                            navigator.vibrate(50);
                        }
                    } else if (gameState.mode === 'reaction') {
                        // 反应模式逻辑
                        if (gameState.greenTime && !gameState.falseStart && !gameState[reactionState]) {
                            // 记录反应时间
                            gameState[reactionState] = Math.round(performance.now() - gameState.greenTime);
                            reactionText.textContent = `${isBlue ? '蓝方' : '红方'}反应: ${gameState[reactionState]} ms`;

                            // 点击后移除green类，让球变回原来的颜色
                            const blueBall = document.getElementById('blue-ball');
                            const redBall = document.getElementById('red-ball');
                            if (isBlue && blueBall) {
                                blueBall.classList.remove('green');
                            } else if (!isBlue && redBall) {
                                redBall.classList.remove('green');
                            }

                            // 添加震动效果
                            area.classList.add('vibrate');
                            setTimeout(() => {
                                area.classList.remove('vibrate');
                            }, 300);

                            // 播放点击音效
                            playSound(sound);

                            // 移动设备震动反馈
                            if ('vibrate' in navigator) {
                                navigator.vibrate(100);
                            }

                            // 检查是否双方都已点击
                            if ((isBlue && gameState.redReactionTime) || (!isBlue && gameState.blueReactionTime)) {
                                // 判定胜负
                                const winner = gameState.blueReactionTime < gameState.redReactionTime ? 'blue' : 'red';
                                setTimeout(() => {
                                    endGame(winner);
                                }, 500);
                            }
                        }
                    } else if (gameState.mode === 'timing' && gameState.started) {
                        // 检查是否已经完成
                        if (!gameState[`${player}Completed`]) {
                            // 如果是第一次点击，开始计时
                            if (!gameState[`${player}StopwatchRunning`]) {
                                gameState[`${player}StopwatchRunning`] = true;
                                gameState[`${player}StopwatchStartTime`] = performance.now();

                                // 开始秒表计时器
                                gameState[`${player}StopwatchInterval`] = setInterval(() => {
                                    gameState[stopwatchState] = performance.now() - gameState[`${player}StopwatchStartTime`];
                                    updateTimingDisplay();
                                }, 10); // 更新频率为10毫秒，确保毫秒级精度

                                // 播放点击音效
                                playSound(sound);

                                // 移动设备震动反馈
                                if ('vibrate' in navigator) {
                                    navigator.vibrate(50);
                                }
                            } else {
                                // 停止对应的秒表
                                clearInterval(gameState[`${player}StopwatchInterval`]);

                                // 计算最终时间（精确到毫秒）
                                gameState[stopwatchState] = performance.now() - gameState[`${player}StopwatchStartTime`];
                                gameState[`${player}Completed`] = true;

                                // 更新显示
                                updateTimingDisplay();

                                // 添加震动效果
                                area.classList.add('vibrate');
                                setTimeout(() => {
                                    area.classList.remove('vibrate');
                                }, 300);

                                // 创建波纹效果
                                const rect = area.getBoundingClientRect();
                                createRipple(rect.width / 2, rect.height / 2, player);

                                // 播放点击音效
                                playSound(sound);

                                // 移动设备震动反馈
                                if ('vibrate' in navigator) {
                                    navigator.vibrate(100);
                                }

                                // 检查是否双方都已停止
                                if (gameState.blueCompleted && gameState.redCompleted) {
                                    // 判定胜负
                                    const blueDifference = Math.abs((gameState.blueStopwatchTime / 1000) - gameState.targetTime);
                                    const redDifference = Math.abs((gameState.redStopwatchTime / 1000) - gameState.targetTime);
                                    const winner = blueDifference < redDifference ? 'blue' : 'red';

                                    setTimeout(() => {
                                        endGame(winner);
                                    }, 1000);
                                }
                            }
                        }
                    }
                }
            }
        }

        // 重置玩家按下状态的函数
        function resetPlayerPressed(player) {
            gameState[player === 'blue' ? 'bluePressed' : 'redPressed'] = false;
        }

        // 键盘事件监听
        document.addEventListener('keydown', (event) => {
            // 只有在游戏开始后且不在倒计时阶段才能操作
            if ((gameState.started || gameState.mode === 'reaction' || gameState.mode === 'timing') && !gameState.countingDown) {
                const key = event.key.toLowerCase();
                if (key === gameSettings.blueKey) {
                    handlePlayerAction('blue');
                } else if (key === gameSettings.redKey) {
                    handlePlayerAction('red');
                }
            }
        });

        // 触摸事件监听 - 蓝方区域
        blueArea.addEventListener('touchstart', (event) => {
            event.preventDefault();
            handlePlayerAction('blue');
        });

        blueArea.addEventListener('touchend', (event) => {
            event.preventDefault();
            resetPlayerPressed('blue');
        });

        // 触摸事件监听 - 红方区域
        redArea.addEventListener('touchstart', (event) => {
            event.preventDefault();
            handlePlayerAction('red');
        });

        redArea.addEventListener('touchend', (event) => {
            event.preventDefault();
            resetPlayerPressed('red');
        });

        // 鼠标点击事件监听 - 蓝方区域
        blueArea.addEventListener('mousedown', (event) => {
            if (!gameState.started && !gameState.countingDown) return;
            handlePlayerAction('blue');
        });

        blueArea.addEventListener('mouseup', () => resetPlayerPressed('blue'));
        blueArea.addEventListener('mouseleave', () => resetPlayerPressed('blue'));

        // 鼠标点击事件监听 - 红方区域
        redArea.addEventListener('mousedown', (event) => {
            if (!gameState.started && !gameState.countingDown) return;
            handlePlayerAction('red');
        });

        redArea.addEventListener('mouseup', () => resetPlayerPressed('red'));
        redArea.addEventListener('mouseleave', () => resetPlayerPressed('red'));

        // 键盘抬起事件监听
        document.addEventListener('keyup', (event) => {
            const key = event.key.toLowerCase();
            if (key === gameSettings.blueKey) {
                resetPlayerPressed('blue');
            } else if (key === gameSettings.redKey) {
                resetPlayerPressed('red');
            }
        });

        // 为开始按钮添加事件监听器
        startCPSButton.addEventListener('click', () => {
            // Guard: prevent restart during active game or countdown
            if (gameState.started || gameState.countingDown) return;
            if (gameState.mode !== 'cps') {
                switchMode('cps');
            }
            resetGame();
            startCPSGame();
        });

        startReactionButton.addEventListener('click', () => {
            // Guard: prevent restart during active game or countdown
            if (gameState.started || gameState.countingDown) return;
            if (gameState.mode !== 'reaction') {
                switchMode('reaction');
            }
            resetGame();
            startReactionGame();
        });

        startTimingButton.addEventListener('click', () => {
            // Guard: prevent restart during active game or countdown
            if (gameState.started || gameState.countingDown) return;
            if (gameState.mode !== 'timing') {
                switchMode('timing');
            }
            resetGame();
            startTimingGame();
        });

        cpsModeButton.addEventListener('click', () => {
            if (gameState.started || gameState.countingDown) return;
            switchMode('cps');
        });

        reactionModeButton.addEventListener('click', () => {
            if (gameState.started || gameState.countingDown) return;
            switchMode('reaction');
        });

        timingModeButton.addEventListener('click', () => {
            if (gameState.started || gameState.countingDown) return;
            switchMode('timing');
        });

        // 初始化游戏状态
        switchMode('cps');
    </script>
</body>

</html>
